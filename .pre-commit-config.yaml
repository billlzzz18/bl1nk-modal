repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --check
        language: system
        pass_filenames: false
        files: ^modal-apps/modal-opencode/engine/Cargo.toml
      - id: cargo-test
        name: cargo test
        entry: cargo test --all
        language: system
        pass_filenames: false
        files: ^modal-apps/modal-opencode/engine/Cargo.toml
