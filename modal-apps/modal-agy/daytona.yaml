image: ubuntu:24.04

env:
  PATH: /root/.cargo/bin:/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

workspace:
  persist: true

resources:
  cpu: 2
  memory: 4Gi
  disk: 20Gi

post_create:
  - command: |
      apt-get update && apt-get install -y curl git npm
  - command: |
      curl -fsSL https://bun.sh/install | bash
  - command: |
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  - command: |
      mkdir -p /mnt/persistent_agents
